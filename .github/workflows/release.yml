name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @plantar/desktop release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Сборки пока не подписываются: не искать сертификаты на macOS-раннере
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
